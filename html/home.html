<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính tiền đánh bài</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="page-shell">
        <div class="top-section">
            <div class="top-bar">
                <div class="top-bar-actions">
                    <button
                        id="theme-toggle"
                        class="theme-toggle"
                        type="button"
                        aria-label="Chuyển sang dark mode"
                        title="Đổi giao diện"
                    >
                        <span class="theme-toggle-icon theme-toggle-sun" aria-hidden="true">☀</span>
                        <span class="theme-toggle-icon theme-toggle-moon" aria-hidden="true">☾</span>
                    </button>

                    <div class="top-bar-action-center">
                        <button
                            id="create-player-list"
                            class="btn action-button"
                            type="button"
                        >
                            Create Player List
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mid-section">
            <div class="container">
                <div class="card-grid" role="list">
                    <div class="item-card" role="listitem">1</div>
                    <div class="item-card" role="listitem">2</div>
                    <div class="item-card" role="listitem">3</div>
                    <div class="item-card" role="listitem">4</div>
                </div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="container">
                <div class="content-shell"></div>
            </div>
        </div>
    </div>

    <div id="player-modal-host"></div>

    <script src="../js/change-theme.js"></script>
    <script src="../js/player-functions.js"></script>
</body>
</html>
