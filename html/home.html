<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính tiền đánh bài</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="page-shell">
        <div class="top-section">
            <div class="top-bar">
                <div class="top-bar-actions">
                    <button
                        id="theme-toggle"
                        class="theme-toggle"
                        type="button"
                        aria-label="Chuyển sang dark mode"
                        title="Đổi giao diện"
                    >
                        <span class="theme-toggle-icon theme-toggle-sun" aria-hidden="true">☀</span>
                        <span class="theme-toggle-icon theme-toggle-moon" aria-hidden="true">☾</span>
                    </button>

                    <div class="top-bar-action-center">
                        <button
                            id="create-player-list"
                            class="btn action-button"
                            type="button"
                        >
                            Create Player List
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mid-section">
            <div class="container">
                <div class="card-grid" role="list">
                    <div class="item-card" role="listitem">
                        <img class="item-card-icon" src="../static/icon/edit-player.png" alt="Thông tin người chơi">
                        <span>Thông tin người chơi</span>
                    </div>
                    <div class="item-card" role="listitem">
                        <img class="item-card-icon" src="../static/icon/calc-cash.png" alt="Kết thúc ván">
                        <span>Kết thúc ván</span>
                    </div>
                    <div class="item-card" role="listitem">
                        <img class="item-card-icon" src="../static/icon/history-match.png" alt="Lịch sử cuộc chơi">
                        <span>Lịch sử cuộc chơi</span>
                    </div>
                    <div class="item-card" role="listitem">
                        <img class="item-card-icon" src="../static/icon/ranking-player.png" alt="Ranking">
                        <span>Ranking</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="container">
                <div class="content-shell"></div>
            </div>
        </div>
    </div>

    <div id="player-modal-host"></div>

    <script src="../js/change-theme.js"></script>
    <script src="../js/player-functions.js"></script>
</body>
</html>
